name: Fathom new-call notifier

# NOTIFY ONLY. This workflow used to auto-inject LLM-extracted participant JS into
# index.html and commit it — that corrupted the live dashboard twice (2026-07-03 and
# 2026-07-07 / commit 8b73f4a). It no longer edits or commits anything. It just checks
# Fathom for research calls that aren't on the dashboard yet and opens/updates a GitHub
# issue so Jordan can hand-add + verify them. See scripts/notify_new_calls.py.

on:
  schedule:
    # 11 PM Colombia time = 4 AM UTC (Colombia is UTC-5)
    - cron: '0 4 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect un-added Fathom research calls
        id: detect
        env:
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
        run: python scripts/notify_new_calls.py

      - name: Open or update tracking issue
        if: steps.detect.outputs.new_count != '' && steps.detect.outputs.new_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="🆕 New Fathom research call(s) ready to add"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "Updating existing issue #$existing"
            gh issue comment "$existing" --body-file fathom_new_calls.md
          else
            echo "Creating new tracking issue"
            gh issue create --title "$title" --body-file fathom_new_calls.md
          fi
